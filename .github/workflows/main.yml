name: Build Ungoogled Chromium
on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: false
        type: boolean

jobs:
  build-x64:
    runs-on: windows-2022
    timeout-minutes: 480
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: python -m pip install httplib2==0.22.0
      
      - name: Build Chromium x64
        run: python build.py --ci
        timeout-minutes: 360
      
      - name: Package Chromium x64
        run: python package.py
      
      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chromium-x64
          path: build/ungoogled-chromium*
          retention-days: 7
          compression-level: 0

  publish-release:
    if: inputs.create_release
    needs: build-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download x64 package
        uses: actions/download-artifact@v4
        with:
          name: chromium-x64
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.run_id }}-x64
          name: Ungoogled Chromium x64 Build
          body: |
            Automated build of ungoogled-chromium for x64 architecture.
            
            Built from commit: ${{ github.sha }}
            Workflow run: ${{ github.run_id }}
          draft: false
          prerelease: true
          files: |
            ungoogled-chromium*
